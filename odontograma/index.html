<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odontograma Voice Pro | Francisco Méndez</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Odontograma Digital Inteligente</h1>
        <p>Especialidad en Implantología</p>
    </header>

    <main>
        <div class="panel-control">
            <button id="btn-voz" class="btn-primario">🎤 Iniciar Dictado</button>
            <div id="status-box">
                <span id="indicador"></span>
                <p id="feedback">Listo para registrar...</p>
            </div>
        </div>

        <div id="odontograma-grid">
            </div>

        <section class="versiones-container">
            <h3>Historial de Versiones (Sincronizado)</h3>
            <button id="btn-guardar" class="btn-secundario">💾 Guardar Versión Actual</button>
            <ul id="lista-versiones"></ul>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
