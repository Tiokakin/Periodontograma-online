<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoVoice Pro | Suite Dental</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <header class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg font-bold">
                    D
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 tracking-tight">OdontoVoice Pro</h1>
                    <p class="text-[10px] text-indigo-600 font-bold uppercase tracking-widest">Módulo de Odontograma</p>
                </div>
            </div>

            <div id="user-pill" class="flex items-center gap-3 bg-slate-100 px-4 py-2 rounded-full border border-slate-200">
                <div class="text-right">
                    <p id="nombre-paciente" class="text-sm font-bold text-slate-700 leading-none italic">Cargando paciente...</p>
                    <p id="id-sesion" class="text-[10px] text-slate-500 mt-1 uppercase">Sesión: #---</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <aside class="lg:col-span-1 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Controles Clínicos</h2>
                
                <button id="btn-voz" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg flex items-center justify-center gap-3">
                    <span id="indicador-mic" class="w-3 h-3 bg-white rounded-full"></span>
                    Iniciar Dictado
                </button>

                <div class="mt-4 p-3 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                    <p id="feedback" class="text-xs text-slate-500 italic text-center">"Pieza 18 caries..."</p>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-3">
            <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <div id="odontograma-grid" class="grid grid-cols-8 md:grid-cols-16 gap-3 min-w-[600px]">
                    </div>
            </div>

            <div class="mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-3 bg-slate-50 border-b border-slate-200">
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase">Hallazgos de la sesión actual</h3>
                </div>
                <ul id="lista-historial" class="divide-y divide-slate-100 max-h-48 overflow-y-auto">
                    </ul>
            </div>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
