<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriodontoVoice Pro v0.0201</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-white border-b p-4 shadow-sm sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-indigo-600">
                <i class="fas fa-tooth text-2xl"></i>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">PeriodontoVoice <span class="text-indigo-600">Pro</span></h1>
            </div>
            <div id="banner-paciente" class="bg-slate-100 px-3 py-1 rounded-full border flex items-center gap-2">
                <span id="nombre-paciente-display" class="text-sm font-bold text-slate-600 italic">Cargando sesión...</span>
                <i class="fas fa-user-md text-indigo-400"></i>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button id="btn-voz" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                <i class="fas fa-microphone mr-2"></i> Iniciar Dictado
            </button>
            <button id="btn-guardar" class="bg-white border-2 border-slate-200 hover:border-indigo-600 text-slate-600 font-bold py-4 rounded-xl transition-all shadow-sm">
                <i class="fas fa-save mr-2"></i> Guardar Diente
            </button>
            <button id="btn-pdf" class="bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                <i class="fas fa-file-pdf mr-2"></i> Generar Informe
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
                <div class="flex justify-between items-center mb-2">
                    <h2 id="diente-actual" class="text-2xl font-black text-slate-900">Diente: 1.8</h2>
                    <span id="status" class="text-[10px] font-bold text-amber-600 uppercase italic">Esperando...</span>
                </div>
                <div class="bg-slate-50 rounded-xl p-2 border border-dashed border-slate-300">
                    <svg id="periodontograma-svg" viewBox="0 0 300 200" class="w-full">
                        <g id="silueta-diente" fill="#fff" stroke="#cbd5e1" stroke-width="1">
                            <path id="forma-diente" d="M80,50 Q80,20 150,20 Q220,20 220,50 L220,80 Q220,150 180,180 L150,150 L120,180 Q80,150 80,80 Z" />
                        </g>
                        <line x1="10" y1="85" x2="290" y2="85" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4" />
                        <polyline id="linea-recesion" fill="none" stroke="#2563eb" stroke-width="4" points="50,85 150,85 250,85" stroke-linecap="round" />
                        <polyline id="linea-sondaje" fill="none" stroke="#dc2626" stroke-width="4" points="50,85 150,85 250,85" stroke-linecap="round" />
                    </svg>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border shadow-sm overflow-hidden">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-slate-400 border-b italic"><th class="pb-2 text-left">Cara</th><th class="pb-2">NIC</th><th class="pb-2">PS</th><th class="pb-2">REC</th><th class="pb-2">SS</th></tr>
                    </thead>
                    <tbody id="cuerpo-tabla">
                        <tr class="border-b border-slate-50"><td>V.D</td><td><input type="number" id="v-d-nic" value="0" class="w-12 bg-slate-100 rounded text-center font-bold"></td><td><input type="number" id="v-d-ps" value="0" class="w-12 bg-slate-100 rounded text-center font-bold"></td><td id="v-d-rec" class="text-center font-bold text-indigo-600">0</td><td class="text-center"><input type="checkbox" id="v-d-ss"></td></tr>
                        <tr class="border-b border-slate-50"><td>V.M</td><td><input type="number" id="v-m-nic" value="0" class="w-12 bg-slate-100 rounded text-center font-bold"></td><td><input type="number" id="v-m-ps" value="0" class="w-12 bg-slate-100 rounded text-center font-bold"></td><td id="v-m-rec" class="text-center font-bold text-indigo-600">0</td><td class="text-center"><input type="checkbox" id="v-m-ss"></td></tr>
                        <tr class="border-b-2 border-slate-100"><td>V.Mes</td><td><input type="number" id="v-mes-nic" value="0" class="w-12 bg-slate-100 rounded text-center font-bold"></td><td><input type="number" id="v-mes-ps" value="0" class="w-12 bg-slate-100 rounded text-center font-bold"></td><td id="v-mes-rec" class="text-center font-bold text-indigo-600">0</td><td class="text-center"><input type="checkbox" id="v-mes-ss"></td></tr>
                        <tr class="bg-slate-50"><td>P.D</td><td><input type="number" id="p-d-nic" value="0" class="w-12 bg-white rounded text-center font-bold"></td><td><input type="number" id="p-d-ps" value="0" class="w-12 bg-white rounded text-center font-bold"></td><td id="p-d-rec" class="text-center font-bold text-indigo-600">0</td><td class="text-center"><input type="checkbox" id="p-d-ss"></td></tr>
                        <tr class="bg-slate-50"><td>P.M</td><td><input type="number" id="p-m-nic" value="0" class="w-12 bg-white rounded text-center font-bold"></td><td><input type="number" id="p-m-ps" value="0" class="w-12 bg-white rounded text-center font-bold"></td><td id="p-m-rec" class="text-center font-bold text-indigo-600">0</td><td class="text-center"><input type="checkbox" id="p-m-ss"></td></tr>
                        <tr class="bg-slate-50"><td>P.Mes</td><td><input type="number" id="p-mes-nic" value="0" class="w-12 bg-white rounded text-center font-bold"></td><td><input type="number" id="p-mes-ps" value="0" class="w-12 bg-white rounded text-center font-bold"></td><td id="p-mes-rec" class="text-center font-bold text-indigo-600">0</td><td class="text-center"><input type="checkbox" id="p-mes-ss"></td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <section class="bg-white p-5 rounded-2xl border shadow-sm">
            <h3 class="text-slate-500 font-bold text-sm mb-3 uppercase tracking-widest"><i class="fas fa-list-ul mr-2"></i> Sesión Actual</h3>
            <div id="lista-historial" class="flex flex-wrap gap-2">
                </div>
        </section>
    </main>

    <footer class="p-6 text-center text-slate-400 text-[10px] uppercase">
        Portal Suite Dental | PeriodontoVoice Pro v0.0202 |
