<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Suite Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="min-h-screen font-sans text-slate-800">

    <nav class="p-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-tooth text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase">Dental<span class="text-blue-600">Suite</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Innovation Lab</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        <div class="glass rounded-3xl p-8 mb-12 shadow-xl shadow-blue-900/5 border border-white">
            <div class="flex flex-col md:flex-row gap-6 items-end">
                <div class="flex-1 w-full">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Profesional Evaluador</label>
                    <div class="relative">
                        <i class="fa-solid fa-user-md absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="operador" placeholder="Nombre del Dr/Dra" 
                            class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white/50 border border-slate-200 focus:border-blue-500 outline-none transition text-sm">
                    </div>
                </div>

                <div class="flex-[1.5] w-full">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Datos del Paciente</label>
                    <div class="flex gap-4">
                        <div class="relative flex-1">
                            <i class="fa-solid fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" id="paciente-id" placeholder="Nombre completo" 
                                class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white/50 border border-slate-200 focus:border-blue-500 outline-none transition text-sm">
                        </div>
                        <input type="number" id="paciente-edad" placeholder="Edad" 
                            class="w-24 px-4 py-3 rounded-2xl bg-white/50 border border-slate-200 focus:border-blue-500 outline-none transition text-sm text-center">
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="card-dental bg-white rounded-[2rem] p-8 shadow-xl shadow-slate-200/50 flex flex-col border border-slate-100">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fa-solid fa-microphone-lines text-blue-600 text-2xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-3">PeriodontoVoice</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-8 flex-grow">
                    Registro de sacos, recesiones y NIC mediante comandos de voz.
                </p>
                <a href="./Appsdental/index.html" onclick="prepararSesion()" class="flex items-center justify-center gap-3 bg-slate-900 hover:bg-blue-600 text-white py-4 rounded-2xl font-bold transition-all">
                    Lanzar Aplicación <i class="fa-solid fa-chevron-right text-xs"></i>
                </a>
            </div>

            <div class="card-dental bg-white rounded-[2rem] p-8 shadow-xl shadow-slate-200/50 flex flex-col border border-slate-100">
                <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fa-solid fa-tooth text-indigo-600 text-2xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 mb-3">OdontoVoice</h3>
                <p class="text-slate-500 text-sm leading-relaxed mb-8 flex-grow">
                    Mapeo general de patologías y restauraciones dentales por voz.
                </p>
                <a href="./odontograma/index.html" onclick="prepararSesion()" class="flex items-center justify-center gap-3 bg-slate-900 hover:bg-indigo-600 text-white py-4 rounded-2xl font-bold transition-all">
                    Lanzar Aplicación <i class="fa-solid fa-chevron-right text-xs"></i>
                </a>
            </div>

        </div>
    </main>

    <footer class="mt-20 border-t border-slate-200 py-10">
        <div class="container mx-auto px-6 flex flex-col items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="version-label" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">v0.0005</span>
            </div>
            <p class="text-slate-400 text-[10px] uppercase tracking-widest italic text-center">
                Desarrollado para Odontología Digital e Implantología
            </p>
        </div>
    </footer>

    <script src="./assets/js/main.js"></script>
</body>
</html>
