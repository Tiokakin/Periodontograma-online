<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Suite | Francisco Méndez</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        body {
            background: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
        }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-800">

    <nav class="p-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-tooth text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-slate-900">DENTAL<span class="text-blue-600">SUITE</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Innovation Lab</p>
                </div>
            </div>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-slate-500">
                <span class="text-blue-600 border-b-2 border-blue-600">Dashboard</span>
                <span class="hover:text-slate-800 cursor-pointer transition">Pacientes</span>
                <span class="hover:text-slate-800 cursor-pointer transition">Configuración</span>
            </div>
        </div>
    </nav>

  <main class="container mx-auto px-6 py-8">
    <div class="glass rounded-3xl p-8 mb-12 shadow-xl shadow-blue-900/5 border border-white">
        <div class="flex flex-col md:flex-row gap-6 items-end">
            <div class="flex-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Profesional Evaluador</label>
                <div class="relative">
                    <i class="fa-solid fa-user-md absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="operador" placeholder="Ej: Dr. Pérez" 
                        class="w-full pl-11 pr-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition text-sm">
                </div>
            </div>

            <div class="flex-[1.5]">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Identificación del Paciente</label>
                <div class="flex gap-4">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="paciente-id" placeholder="Nombre completo o RUT" 
                            class="w-full pl-11 pr-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition text-sm">
                    </div>
                    <div class="relative w-32">
                        <input type="number" id="paciente-edad" placeholder="Edad" 
                            class="w-full px-4 py-3 rounded-2xl bg-slate-50 border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition text-sm text-center">
                    </div>
                </div>
            </div>

            <button onclick="guardarDatosSesion()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl font-bold text-sm transition shadow-lg shadow-blue-200">
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
</main>

    <footer class="mt-20 border-t border-slate-200 py-10">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <span class="text-xs font-bold text-slate-500 tracking-tighter uppercase">Versión 0.0002 Alpha</span>
            </div>
            <p class="text-slate-400 text-[10px] font-medium uppercase tracking-widest">© 2026 Dr. Francisco Méndez | Implantología Dental</p>
        </div>
    </footer>

</body>
</html>
