<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriodontoVoice Pro - Clasificación 2017</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Asistente Periodontal 🦷</h1>
        <div id="status-container">
            <button id="btn-voz">🎤 Iniciar Dictado</button>
            <p id="status">Estado: Listo para trabajar</p>
        </div>
    </header>

    <main>
        <div class="ficha-clinica">
            <h2 id="diente-actual">Diente: 1.6</h2>
            <div class="grafico-container">
    <svg id="periodontograma-svg" viewBox="0 0 300 150">
        <line x1="0" y1="50" x2="300" y2="50" stroke="#ccc" stroke-dasharray="4"/>
        
        <polyline id="linea-recesion" fill="none" stroke="blue" stroke-width="2" points="50,50 150,50 250,50" />
        
        <polyline id="linea-sondaje" fill="none" stroke="red" stroke-width="2" points="50,50 150,50 250,50" />
    </svg>
</div>
            <div class="tabla-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Cara</th>
                            <th>Punto</th>
                            <th>NIC</th>
                            <th>PS</th>
                            <th>REC</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td rowspan="3" class="etiqueta-cara">Vest.</td>
                            <td>Distal</td>
                            <td><input type="number" id="v-d-nic" placeholder="0"></td>
                            <td><input type="number" id="v-d-ps" placeholder="0"></td>
                            <td id="v-d-rec" class="rec-val">0</td>
                        </tr>
                        <tr>
                            <td>Medio</td>
                            <td><input type="number" id="v-m-nic" placeholder="0"></td>
                            <td><input type="number" id="v-m-ps" placeholder="0"></td>
                            <td id="v-m-rec" class="rec-val">0</td>
                        </tr>
                        <tr>
                            <td>Mesial</td>
                            <td><input type="number" id="v-mes-nic" placeholder="0"></td>
                            <td><input type="number" id="v-mes-ps" placeholder="0"></td>
                            <td id="v-mes-rec" class="rec-val">0</td>
                        </tr>
                        <tr class="separador">
                            <td rowspan="3" class="etiqueta-cara">Palat.</td>
                            <td>Distal</td>
                            <td><input type="number" id="p-d-nic" placeholder="0"></td>
                            <td><input type="number" id="p-d-ps" placeholder="0"></td>
                            <td id="p-d-rec" class="rec-val">0</td>
                        </tr>
                        <tr>
                            <td>Medio</td>
                            <td><input type="number" id="p-m-nic" placeholder="0"></td>
                            <td><input type="number" id="p-m-ps" placeholder="0"></td>
                            <td id="p-m-rec" class="rec-val">0</td>
                        </tr>
                        <tr>
                            <td>Mesial</td>
                            <td><input type="number" id="p-mes-nic" placeholder="0"></td>
                            <td><input type="number" id="p-mes-ps" placeholder="0"></td>
                            <td id="p-mes-rec" class="rec-val">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <footer>
    <p>Software de Diagnóstico Periodontal | Versión: <span id="version-num">0.0004.1</span></p>
</footer>
    <thead>
    <tr>
        <th>Cara</th>
        <th>Punto</th>
        <th>NIC</th>
        <th>PS</th>
        <th>REC</th>
        <th>SS</th>
        <th>SUP</th>
    </tr>
</thead>
<tbody>
    <tr>
        <td rowspan="3" class="etiqueta-cara">Vest.</td>
        <td>Distal</td>
        <td><input type="number" id="v-d-nic" placeholder="0"></td>
        <td><input type="number" id="v-d-ps" placeholder="0"></td>
        <td id="v-d-rec" class="rec-val">0</td>
        <td><input type="checkbox" id="v-d-ss"></td>
        <td><input type="checkbox" id="v-d-sup"></td>
    </tr>
    </tbody>
</body>
</html>
